display:
  - platform: st7701s
    id: st7701_display
    rotation: 0
    update_interval: 5s
    auto_clear_enabled: false
    data_rate: 8MHz
    spi_mode: MODE3
    color_order: RGB
    dimensions:
      width: 480
      height: 480
    invert_colors: false
    transform:
      mirror_x: true
      mirror_y: true
    cs_pin: 39
      # reset not defined 
    reset_pin: # CONNECTED TO GND
      pca9554: p_c_a
      number: 5
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence: 
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10] # CMD2_BKSEL_BK0
      - [0xCD, 0x00] # disable MDT flag
    pclk_frequency: 12MHz
    pclk_inverted: false
    data_pins:
      red:
        - 11         # R1
        - 12         # R2
        - 13         # R3
        - 14         # R4
        - 0          # R5
      green:
        - 8          # G0
        - 20         # G1
        - 3          # G2
        - 46         # G3
        - 9          # G4
        - 10         # G5 
      blue:
        - 4          # B1
        - 5          # B2
        - 6          # B3
        - 7          # B4
        - 15         # B5

    lambda: |-
      auto &display_utils = get_display_utils();
      // Initialisierungen nur einmal durchfû¥hren
      if (!id(display_initialized)) {
        display_utils.roboto_12 = id(roboto_12);
        display_utils.roboto_14 = id(roboto_14);
        display_utils.roboto_16 = id(roboto_16);
        display_utils.roboto_18 = id(roboto_18);
        display_utils.roboto_20 = id(roboto_20);
        display_utils.roboto_25 = id(roboto_25);
        display_utils.roboto_30 = id(roboto_30);
        display_utils.roboto_35 = id(roboto_35);
        display_utils.roboto_40 = id(roboto_40);
        display_utils.roboto_45 = id(roboto_45);
        display_utils.roboto_50 = id(roboto_50);
        display_utils.roboto_60 = id(roboto_60);
        display_utils.roboto_70 = id(roboto_70);
        display_utils.roboto_80 = id(roboto_80);
        display_utils.roboto_90 = id(roboto_90);
        display_utils.image_bg = id(img_bg);
        display_utils.set_grid(480, 480, 2, 3, 0, 0);
        display_utils.register_action_handler("toggle_victron", []() {
          ESP_LOGI("Touch", "TOGGLE ACTION FIRED");
          if (id(shelly_victron_in).state)
            id(shelly_victron_in).turn_off();
          else
            id(shelly_victron_in).turn_on();
          });
        display_utils.register_action_handler("climate_down", []() {
          id(climate_dane_target).publish_state(id(climate_dane_target).state - 1.0f);
        });
        display_utils.register_action_handler("climate_up", []() {
          id(climate_dane_target).publish_state(id(climate_dane_target).state + 1.0f);
        });
        display_utils.render_battery_tile(it, 1, 1, "AKKU LADESTAND", id(battery_percent).state, "999999");
        display_utils.render_tile_compact(it, 2, 1, "AKKU VOLT", id(battery_voltage).state, " V", "%.1f", "999999");
        display_utils.render_tile_compact(it, 1, 2, "STROMPREIS", id(strompreis_aktuell).state, "ã˜", "%.2f", "999999");
        display_utils.render_tile_compact(it, 2, 2, "BOT LEISTUNG", id(officebot_stromverbrauch_gesamt).state, " W", "%.0f", "999999");
        display_utils.render_tile_compact(it, 1, 3, "AKKU LADEN", 0, "", "%.0f", "999999", {{DisplayUtils::TouchArea::CENTER, "toggle_victron"}});
        display_utils.render_climate_tile(it, 2, 3, "CLIMATE", id(climate_dane_target).state, id(climate_dane_current).state, "999999", {{DisplayUtils::TouchArea::LEFT, "climate_down"},{DisplayUtils::TouchArea::RIGHT, "climate_up"}});
        id(display_initialized) = true;
      }

      display_utils.update_battery_tile_if_changed(it, 1, 1, id(battery_percent).state);
      display_utils.update_value_if_changed(it, 2, 1, id(battery_voltage).state, " V", "%.1f");
      display_utils.update_value_if_changed(it, 1, 2, id(strompreis_aktuell).state, "ã˜", "%.2f");
      display_utils.update_value_if_changed(it, 2, 2, id(officebot_stromverbrauch_gesamt).state, " W", "%.0f");
      display_utils.update_value_if_changed(it, 1, 3, id(shelly_victron_in).state ? "ON" : "OFF");
      display_utils.update_climate_tile_if_changed(it, 2, 3, id(climate_dane_target).state, id(climate_dane_current).state);

