    name: "Battery Percent"
    entity_id: sensor.victron_system_battery_soc
    id: battery_percent
  - platform: homeassistant
    name: "Strompreis aktuell"
    entity_id: sensor.strompreis_aktuell
    id: strompreis_aktuell
  - platform: homeassistant
    name: "OfficeBot Power"
    entity_id: sensor.officebot_stromverbrauch_gesamt
    id: officebot_stromverbrauch_gesamt
  - platform: homeassistant
    name: "Victron In Power"
    entity_id: sensor.shelly_victron_in_power
    id: shelly_victron_in_power
  - platform: homeassistant
    name: "Spannung"
    entity_id: sensor.victron_system_battery_voltage
    id: battery_voltage
  - platform: homeassistant
    name: "Temp Dane Office"
    entity_id: sensor.shellyhtg3_3030f9e6559c_temperature
    id: temperature_dane_office
  - platform: homeassistant
    name: "Shelly In State"
    entity_id: switch.shelly_victron_in
    id: shelly_victron_in_state
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("Sensor", "Shelly In state changed");
            id(st7701_display)->update();  // Display explizit aktualisieren
  - platform: homeassistant
    name: "Climate Target"
    entity_id: climate.thermostat_office_dane_thermostat
    attribute: temperature
    id: climate_dane_target

  - platform: homeassistant
    name: "Climate Current"
    entity_id: climate.thermostat_office_dane_thermostat
    attribute: current_temperature
    id: climate_dane_current

switch:
  - platform: homeassistant
    name: "Shelly In"
    entity_id: switch.shelly_victron_in
    id: shelly_victron_in

binary_sensor:


#-------------------------------------------
# GT911 touchscreen sensor
#-------------------------------------------
  - platform: gt911
    name: "Home"
    index: 0
   
#-------------------------------------------
# OUTPUTS
#-------------------------------------------
output:
  - platform: ledc
    pin: GPIO38
    id: backlight
    frequency: 100Hz

#-------------------------------------------
# LIGHTS
#-------------------------------------------
light:
  - platform: monochromatic
    output: backlight
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

# I/O expander. Touchscreen RESET and INTERRUPT are not used.
pca9554:
  - id: p_c_a
    pin_count: 16
    address: 0x20

touchscreen:
  platform: gt911
  #rotation: 180
  transform:
    mirror_x: true
    mirror_y: true
  id: my_touchscreen
  display: st7701_display
  
  on_touch:
    - logger.log:
        format: Touch at raw (%d, %d) normalized (%d, %d)
        args: [touch.x_raw, touch.y_raw, touch.x, touch.y]
    - lambda: |-
        // Rotation aus der Displaykonfiguration (manuell festlegen)
        int rotation = 0;  // ûndere dies je nach Displayrotation

        // Original-Touch-Koordinaten loggen
        ESP_LOGI("cal", "Original Touch: x=%d, y=%d, x_raw=%d, y_raw=%d", touch.x, touch.y, touch.x_raw, touch.y_raw);

        // Koordinaten basierend auf Rotation transformieren
        int rotated_x, rotated_y;
        if (rotation == 0) {
          rotated_x = touch.x;
          rotated_y = touch.y;
        } else if (rotation == 90) {
          rotated_x = touch.y;
          rotated_y = 480 - touch.x;
        } else if (rotation == 180) {
          rotated_x = 480 - touch.x;
          rotated_y = 480 - touch.y;
        } else if (rotation == 270) {
          rotated_x = 480 - touch.y;
          rotated_y = touch.x;
        } else {
          ESP_LOGW("cal", "Unsupported rotation value: %d", rotation);
          rotated_x = touch.x;
          rotated_y = touch.y;
        }

        // Transformierte Koordinaten loggen
        ESP_LOGI("cal", "Rotated Touch: rotated_x=%d, rotated_y=%d", rotated_x, rotated_y);

        int tile_w = 480 / 2;
        int tile_h = 480 / 3;
        int col = (touch.x / tile_w) + 1;
        int row = (touch.y / tile_h) + 1;
        int local_x = touch.x % tile_w;
        ESP_LOGI("Touch", "Touch at row=%d col=%d local_x=%d", row, col, local_x);
        auto &display_utils = get_display_utils();
        display_utils.dispatch_touch(row, col, local_x, tile_w);
    
