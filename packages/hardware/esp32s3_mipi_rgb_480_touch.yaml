# ============================================================================
# Hardware-Config: Guition ESP32-S3-4848S040 mit mipi_rgb Treiber
# ============================================================================
# mipi_rgb ersetzt den alten st7701s-Treiber und bietet:
# - Dirty-Rect-basiertes Flushing (nur geänderte Bereiche → Panel)
# - draw_pixel_at() schreibt in lokalen Buffer, nicht direkt aufs Panel
# - update() flusht ein einziges Dirty-Rechteck
#
# ACHTUNG: Benötigt ESPHome >= 2025.12 (mipi_rgb + GUITION-4848S040 Preset)
# ============================================================================

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: 45
      ignore_strapping_warning: true

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

output:
  - platform: ledc
    pin: GPIO38
    id: backlight
    frequency: 150Hz
    min_power: 0.01
    zero_means_zero: true

light:
  - platform: monochromatic
    output: backlight
    name: ${friendly_name} Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

pca9554:
  - id: p_c_a
    pin_count: 16
    address: 0x20

touchscreen:
  platform: gt911
  id: dashboard_touchscreen
  display: dashboard_display

display:
  - platform: mipi_rgb
    model: GUITION-4848S040
    id: dashboard_display
    update_interval: never
    auto_clear_enabled: false
    # Reset-Pin über PCA9554 I/O-Expander (board-spezifisch)
    reset_pin:
      pca9554: p_c_a
      number: 5
