substitutions:
  dashboard_display_rotation: "0"

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: 45
      ignore_strapping_warning: true

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

output:
  - platform: ledc
    pin: GPIO38
    id: backlight
    frequency: 100Hz

light:
  - platform: monochromatic
    output: backlight
    name: ${friendly_name} Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

pca9554:
  - id: p_c_a
    pin_count: 16
    address: 0x20

touchscreen:
  platform: gt911
  id: dashboard_touchscreen
  display: dashboard_display
  transform:
    mirror_x: true
    mirror_y: true

display:
  - platform: st7701s
    id: dashboard_display
    rotation: ${dashboard_display_rotation}
    # 'never' — alle Redraws explizit über display_->update() in touch/loop
    update_interval: never
    auto_clear_enabled: false
    data_rate: 2MHz
    spi_mode: MODE3
    color_order: RGB
    dimensions:
      width: ${dashboard_width}
      height: ${dashboard_height}
    invert_colors: false
    transform:
      mirror_x: true
      mirror_y: true
    cs_pin: 39
    reset_pin:
      pca9554: p_c_a
      number: 5
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence:
      - 1
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xCD, 0x00]
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 20
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 10
    data_pins:
      red: [11, 12, 13, 14, 0]
      green: [8, 20, 3, 46, 9, 10]
      blue: [4, 5, 6, 7, 15]
