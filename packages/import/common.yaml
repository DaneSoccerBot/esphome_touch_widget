  # Kann pro User-YAML auf Tag/Commit gesetzt werden, z.B. v0.1.1 oder 7cf56a2
  package_ref: main
  tile_dashboard_components_source: github://DaneSoccerBot/esphome_touch_widget/components@${package_ref}
